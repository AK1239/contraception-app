<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover"
    />
    <title>%WEB_TITLE%</title>
    <meta
      name="description"
      content="Evidence-based contraceptive recommendations tailored to your preferences and health profile."
    />
    <meta name="theme-color" content="#4C1D95" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ContraSafe" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /*
        Pin the app to the *visible* viewport.
        On iOS Safari, height:100% resolves to the large layout viewport (behind
        the browser chrome), which clips absolute/bottom footers. Prefer:
        1) --app-height synced from visualViewport (JS below)
        2) 100svh = height with browser chrome fully showing
        3) 100dvh / 100% fallbacks
      */
      :root {
        --app-height: 100svh;
      }

      html,
      body {
        height: var(--app-height, 100svh);
        max-height: var(--app-height, 100svh);
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      #root {
        display: flex;
        flex: 1;
        height: 100%;
        max-height: 100%;
        overflow: hidden;
      }
    </style>
    <script>
      (function () {
        function syncAppHeight() {
          var vv = window.visualViewport;
          var height = vv ? vv.height : window.innerHeight;
          if (!height || height < 1) return;
          document.documentElement.style.setProperty(
            "--app-height",
            height + "px"
          );
        }

        syncAppHeight();
        window.addEventListener("resize", syncAppHeight);
        window.addEventListener("orientationchange", syncAppHeight);
        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", syncAppHeight);
          window.visualViewport.addEventListener("scroll", syncAppHeight);
        }
      })();
    </script>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch((error) => {
            console.error("Service Worker registration failed:", error);
          });
        });
      }
    </script>
  </body>
</html>
